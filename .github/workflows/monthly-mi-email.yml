name: Monthly MI release email

on:
  schedule:
    # 08:00 UTC on the 5th of every month (09:00 BST / 08:00 GMT).
    - cron: '0 8 5 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log recipients but do not send)'
        type: boolean
        default: false
      only_to:
        description: 'Restrict to a single recipient email (testing)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Send monthly MI emails via Microsoft Graph
        env:
          GRAPH_TENANT_ID:     ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID:     ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_SENDER:        ${{ secrets.GRAPH_SENDER }}
          GRAPH_FROM_NAME:     ${{ secrets.GRAPH_FROM_NAME }}
          PORTAL_URL:          ${{ vars.PORTAL_URL }}
          DRY_RUN:             ${{ inputs.dry_run && '1' || '' }}
          ONLY_TO:             ${{ inputs.only_to }}
        run: npm run mail
