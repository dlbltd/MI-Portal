name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify_config:
    name: Verify SWA config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cross-check routes vs roles vs client files
        run: python3 scripts/verify-swa-config.py

  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: verify_config
    # Skip the deploy job until the Azure SWA token is set as a repo secret.
    # This avoids noisy red X's on every push before the Azure portal setup
    # is complete. Once you've created the resource and added the token to
    # repo secrets (see docs/AZURE_SETUP.md §1.2), this guard is harmless —
    # the secret is non-empty so the job runs.
    if: vars.AZURE_SWA_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'
          api_location: ''
          output_location: ''
          skip_app_build: true
          skip_deploy_on_missing_secrets: true
