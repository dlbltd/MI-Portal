name: Email client MI data (CSV attachment)

on:
  workflow_dispatch:
    inputs:
      client_codes:
        description: 'Access codes (space- or comma-separated, e.g. "INSHUR26 ANDE26")'
        type: string
        required: true
      dry_run:
        description: 'Dry run (log only)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Email per-client MI data as CSV attachment
        env:
          GRAPH_TENANT_ID:     ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID:     ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_SENDER:        ${{ secrets.GRAPH_SENDER }}
          GRAPH_FROM_NAME:     ${{ secrets.GRAPH_FROM_NAME }}
          CLIENT_CODE:         ${{ inputs.client_codes }}
          DRY_RUN:             ${{ inputs.dry_run && '1' || '' }}
          SAVE_TO_SENT:        '1'
        run: node scripts/email-client-data.js
